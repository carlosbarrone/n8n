
services:
  runner:
    build:
      context: .
      dockerfile: runner/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - POSTGRES_HOST=${POSTGRES_HOST}
      - POSTGRES_PORT=${POSTGRES_PORT}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - QDRANT_URL=${QDRANT_URL}
      - QDRANT_COLLECTION_NAMES=${QDRANT_COLLECTION_NAMES}
      - QDRANT_VECTOR_SIZE=${QDRANT_VECTOR_SIZE}
      - MISTRAL_API_KEY=${MISTRAL_API_KEY}
    command: ["tail", "-f", "/dev/null"]
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
    volumes:
      - ./runner/scripts:/app/scripts
      - ./sql:/app/sql

  n8n:
    image: n8nio/n8n:latest
    restart: always
    ports:
      - "5678:5678"
    env_file:
      - .env
    environment:
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=${POSTGRES_PORT}
      - DB_POSTGRESDB_DATABASE=${POSTGRES_DB}
      - DB_POSTGRESDB_USER=${POSTGRES_USER}
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD} 
      - N8N_DEFAULT_BINARY_DATA_MODE=filesystem
      - N8N_STORAGE_PATH=/home/node/.n8n-files
      - N8N_RESTRICT_FILE_ACCESS_TO=/files
      - N8N_RUNNERS_MODE=external
      - N8N_RUNNERS_BROKER_LISTEN_ADDRESS=0.0.0.0
      - N8N_RUNNERS_AUTH_TOKEN=${N8N_RUNNERS_SECURE_TOKEN}
      - N8N_NATIVE_PYTHON_RUNNER=true
      - N8N_RUNNERS_STDLIB_ALLOW=*
      - N8N_RUNNERS_EXTERNAL_ALLOW=*
    volumes:
      - ./data/n8n:/home/node/.n8n
      - ./data/n8n/n8n-files:/files
      - ./data/n8n/binaries:/home/node/.n8n/binaries
      - ./data/qdrant:/home/node/qdrant
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started

  task-runners:
    build:
      context: .
      dockerfile: n8n/Dockerfile
    restart: unless-stopped
    environment:
      - N8N_RUNNERS_TASK_BROKER_URI=http://n8n:5679
      - N8N_RUNNERS_AUTH_TOKEN=${N8N_RUNNERS_SECURE_TOKEN}
    depends_on:
      - n8n
    
 
  postgres:
    image: postgres:15
    restart: always
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT}:${POSTGRES_PORT}"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB} -h 127.0.0.1 -p ${POSTGRES_PORT}"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s

  qdrant:
    image: qdrant/qdrant
    restart: always
    ports:
      - "6333:6333"
    volumes:
      - ./data/qdrant:/qdrant/storage